name: Continuous Integration

# 1. Triggers: When should this pipeline run?
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    # 2. Environment: What OS should run the tests?
    runs-on: ubuntu-latest

    steps:
    # 3. Checkout code from the repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 4. Set up the runtime environment (Node.js in this case)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Elevated to NodeJS 22 LTS to resolve Github Actions V4 deprecation limits
        cache: 'npm'

    # 5. Install dependencies cleanly
    - name: Install dependencies
      run: npm ci

    # 6. Generate Prisma Types
    - name: Generate Prisma Client
      run: npx prisma generate

    # 7. Run the Linter to check code quality
    - name: Run Linter
      run: npm run lint

    # 8. Run Unit Tests (TDD focus)
    - name: Run Unit Tests
      run: npm test

    # 9. Verify Next.js Production Build Output
    - name: Build Application
      run: npm run build