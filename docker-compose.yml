version: '3.8'

services:
  # The unified GFM Application Container (Frontend + Backend API Routes)
  gfm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gfm_nextjs_unified
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always
    # Next.js inherently processes Frontend and Backend internally avoiding decoupled synchronization latency.
    # In future Sprints once transitioning from SQLite, leverage network dependency bridging here:
    # depends_on:
    #   - gfm-db

  # Placeholder for Database Network Architecture isolating the persistence layer from the computing layer
  # gfm-db:
  #   image: postgres:15-alpine
  #   container_name: gfm_postgres
  #   environment:
  #     POSTGRES_USER: gfm_admin
  #     POSTGRES_PASSWORD: secure_database_secret
  #     POSTGRES_DB: inputs_acquisition
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - gfm_pg_data:/var/lib/postgresql/data

volumes:
  gfm_pg_data:
