  /your-server.com/your-callback:
    post:
      tags:
        - USSD
      summary: Dedicated USSD
      description: |
        <h3>Dedicated USSD</h3>

        When users dial your dedicated shortcode (e.g., *123#), they interact directly with your USSD app.  

        Dedicated USSD provides **full control of the menu, user flow, and branding** since the shortcode is not shared.  

        <p class="alert-primary"><i class="las la-info-circle" style="font-size:24px"></i>
        mNotify’s Dedicated USSD API allows developers to build custom menus and process user inputs in real-time using HTTP/S requests.</p>

        <h3>HTTP Request</h3>

        ```http
        POST https://your-server.com/callback-url

        ```
        <h3>Expected Response Format</h3>

        Respond with a JSON object including:

        - **responseExitCode** ✅ HTTP response status code (200 = success)  
        - **shouldClose** 🔚 Whether the session ends (`true`) or continues (`false`)  
        - **ussdMenu** 📋 The text menu for the user (use \r\n for line breaks)  
        - **responseMessage** ℹ️ Optional info or error message

      operationId: ussd/dedicated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - shortCode
                - msIsdn
                - text
                - sessId
                - ussdGwId
              properties:
                shortCode:
                  type: string
                  description: The dedicated shortcode assigned
                msIsdn:
                  type: string
                  description: End user's phone number
                text:
                  type: string
                  description: User input during session
                sessId:
                  type: string
                  description: Unique USSD session ID
                ussdGwId:
                  type: string
                  description: Operator handling the session (MTN, Vodafone, AirtelTigo)
                language:
                  type: string
                  description: Optional session language
                imsi:
                  type: string
                  description: IMSI of the SIM card (if available)
                optional:
                  type: string
                  description: Extra parameters from operator
            example:
              shortCode: "*123#"
              msIsdn: "233541509394"
              text: "1"
              sessId: "ABC123456"
              ussdGwId: "MTN"
              language: "en"
      responses:
        "200":
          description: Success - Return USSD response
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseExitCode:
                    type: integer
                  shouldClose:
                    type: boolean
                  ussdMenu:
                    type: string
                  responseMessage:
                    type: string
              example:
                responseExitCode: 200
                shouldClose: false
                ussdMenu: "1. Balance\r\n2. Buy Data\r\n0. Exit"
                responseMessage: "Menu delivered successfully"

