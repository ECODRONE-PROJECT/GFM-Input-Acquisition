  /sms/quick:
    post:
      tags:
        - SMS
      summary: Quick Bulk SMS
      description: |
        Send SMS to clients/contacts using contacts that you have without storing in any group first.  

        <h3>HTTP Request</h3>

        ```http
        POST https://api.mnotify.com/api/sms/quick
        ```

        <p class="alert-primary"><i class="las la-info-circle" style="font-size:24px"></i> _id is the id of the message sent. You can store this id somewhere to check the delivery status of your message. This id is also called campaign id</p>

        <br>

        <h3>Schedule Quick Bulk SMS</h3>

        When scheduling quick SMS, you must set <code>is_schedule</code> to <code>true</code> and include the date and time in <code>schedule_date</code> payload in the format <code>YYYY-MM-DD hh:mm</code>.

        </p> <p class="alert-warning"> <i class="las la-exclamation-triangle" style="font-size:24px"></i> Do not include the <code>sms_otp</code> field in the payload unless the message blast is specifically for OTP purposes. Including it unnecessarily may cause validation errors or unintended behavior. </p>

        <p class="alert-warning">
        <i class="las la-exclamation-triangle" style="font-size:24px"></i>
        When <code>sms_type: "otp"</code> is included in your payload, a charge of 
        <strong>0.035 per campaign</strong> will be deducted from your main wallet.
        </p>

      operationId: campaign/sms_quick
      parameters:
        - name: key
          in: path
          description: Your enabled api key
          required: true
          schema:
            type: string
        - name: recipient
          in: path
          description: Array of phone numbers eg. ['0241234567', '0201234567']
          required: true
          schema:
            type: array
        - name: sender
          in: path
          description: Sender ID of the message. Must be at most 11 characters
          required: true
          schema:
            type: string
        - name: message
          in: path
          description: Message content
          required: true
          schema:
            type: text
        - name: is_schedule
          in: path
          description: Schedule flag. True means schedule message
          required: false
          schema:
            type: boolean
        - name: schedule_date
          in: path
          description: date and time in YYYY-MM-DD hh:mm if is_schedule is true
          required: false
          schema:
            type: datetime
        - name: sms_type
          in: path
          description: type of the sms blast
          required: false
          schema:
            type: string
      security:
        - api_key:
            - your_api_key
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign_sms_quick"
              example:
                status: success
                code: "2000"
                message: messages sent successfully
                summary:
                  _id: A59CCB70-662D-45EF-9976-1EFAD249793D
                  type: API QUICK SMS
                  total_sent: 2
                  contacts: 2
                  total_rejected: 0
                  numbers_sent:
                    - "0241234567"
                    - "0201234567"
                  credit_used: 2
                  credit_left: 1483
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST "https://api.mnotify.com/api/sms/quick?key=YOUR_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "recipient": ["0241234567", "0201234567"],
              "sender": "mNotify",
              "message": "API messaging is fun!",
              "is_schedule": false,
              "schedule_date": "",
            // uncomment the below line to send OTP sms 
            //  When sms_type: "otp" is included in your payload, a charge of 0.035 per campaign will be deducted from your main wallet.
            //  "sms_type": "otp" please do not include in payload when the purpose of the blast is not for otp
            }'

        - lang: php
          source: |
            <?php
            $endPoint = 'https://api.mnotify.com/api/sms/quick';
            $apiKey = 'YOUR_API_KEY';
            $url = $endPoint . '?key=' . $apiKey;

            $data = [
              'recipient' => ['0241234567', '0201234567'],
              'sender' => 'mNotify',
              'message' => 'API messaging is fun!',
              'is_schedule' => false,
              'schedule_date' => '',
            // uncomment the below line to send OTP sms
            // When sms_type: "otp" is included in your payload, a charge of 0.035 per campaign will be deducted from your main wallet.
            // 'sms_type': 'otp' please do not include in payload when the purpose of the blast is not for otp
            ];

            $ch = curl_init();
            curl_setopt($ch, CURLOPT_URL, $url);
            curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);
            curl_setopt($ch, CURLOPT_POST, 1);
            curl_setopt($ch, CURLOPT_HTTPHEADER, ["Content-Type: application/json"]);
            curl_setopt($ch, CURLOPT_POSTFIELDS, json_encode($data));
            $result = curl_exec($ch);
            $result = json_decode($result, TRUE);
            curl_close($ch);
            ?>

        - lang: python
          source: |
            import requests

            endPoint = 'https://api.mnotify.com/api/sms/quick'
            apiKey = 'YOUR_API_KEY'
            url = endPoint + '?key=' + apiKey

            data = {
              "recipient": ["0241234567", "0201234567"],
              "sender": "mNotify",
              "message": "API messaging is fun!",
              "is_schedule": False,
              "schedule_date": "",
            # uncomment the below line to send OTP sms
            # When sms_type: "otp" is included in your payload, a charge of 0.035 per campaign will be deducted from your main wallet.
            # "sms_type": "otp" please do not include in payload when the purpose of the blast is not for otp
            }

            response = requests.post(url, json=data)
            print(response.json())

        - lang: nodejs
          source: |
            const axios = require('axios');

            const endPoint = 'https://api.mnotify.com/api/sms/quick';
            const apiKey = 'YOUR_API_KEY';
            const url = endPoint + '?key=' + apiKey;

            const data = {
              recipient: ['0241234567', '0201234567'],
              sender: 'mNotify',
              message: 'API messaging is fun!',
              is_schedule: false,
              schedule_date: '',
            // uncomment the below line to send OTP sms
            // When sms_type: "otp" is included in your payload, a charge of 0.035 per campaign will be deducted from your main wallet.
            //  sms_type: 'otp' please do not include in payload when the purpose of the blast is not for otp
            };

            axios.post(url, data, {
              headers: { 'Content-Type': 'application/json' }
            })
            .then(response => {
              console.log(response.data);
            })
            .catch(error => {
              console.error(error);
            });

