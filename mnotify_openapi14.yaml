  /initiate-ivr-call:
    post:
      tags:
        - IVR (Inbound)
      summary: Initiate IVR Call
      description:
        "This endpoint initiates an IVR call to a destination number.\n\
        \n<strong>HTTP Request</strong>\n\n    POST https://api.mnotify.com/api/initiate-ivr-call?key=YOUR_API_KEY\"\
        \n\n<p class=\"alert-primary\"><i class=\"las la-info-circle\" style=\"font-size:24px\"\
        ></i>This endpoint starts an Interactive Voice Response (IVR) session with\
        \ the specified destination number.</p>\n"
      operationId: initiate-ivr-call
      parameters:
        - name: key
          in: query
          description: Your enabled api key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fromNumber:
                  type: string
                  description: Caller number initiating the call
                  example: "233501234567"
                toNumber:
                  type: string
                  description: Destination number to dial
                  example: "233541234567"
                uuid:
                  type: string
                  description: Unique identifier for the call session
                  example: abc123
                uniqueId:
                  type: string
                  description: Another unique ID for tracking purposes
                  example: xyz789
              required:
                - fromNumber
                - toNumber
                - uuid
                - uniqueId
      security:
        - api_key:
            - your_api_key
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiate_IVR_Call"
              example:
                status: success
                message: IVR call initiated successfully
                callId: call_12345
      x-codeSamples:
        - lang: curl
          source:
            "curl -X POST \"https://api.mnotify.com/api/initiate-ivr-call?key=YOUR_API_KEY\"\
            \n-H \"Content-Type: application/json\"\n-d '{\n  \"fromNumber\": \"233501234567\"\
            ,\n  \"toNumber\": \"233541234567\",\n  \"uuid\": \"abc123\",\n  \"uniqueId\"\
            : \"xyz789\"\n}'\n"
        - lang: php
          source:
            "<?php\n    $endPoint = 'https://api.mnotify.com/api/initiate-ivr-call';\n\
            \    $apiKey = 'YOUR_API_KEY';\n    $url = $endPoint . '?key=' . $apiKey;\n\
            \    $data = [\n        'fromNumber' => '233501234567',\n        'toNumber'\
            \ => '233541234567',\n        'uuid' => 'abc123',\n        'uniqueId' =>\
            \ 'xyz789'\n    ];\n\n    $ch = curl_init();\n    $headers = array();\n\
            \    $headers[] = \"Content-Type: application/json\";\n    curl_setopt($ch,\
            \ CURLOPT_HTTPHEADER, $headers);\n    curl_setopt($ch, CURLOPT_URL, $url);\n\
            \    curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);\n    curl_setopt($ch,\
            \ CURLOPT_CUSTOMREQUEST, \"POST\");\n    curl_setopt($ch, CURLOPT_POSTFIELDS,\
            \ json_encode($data));\n    $result = curl_exec($ch);\n    $result = json_decode($result,\
            \ TRUE);\n    curl_close($ch);\n?>\n"
        - lang: python
          source:
            "import requests\nimport json\n\nendPoint = 'https://api.mnotify.com/api/initiate-ivr-call'\n\
            apiKey = 'YOUR_API_KEY'\ndata = {\n    'fromNumber': '233501234567',\n \
            \   'toNumber': '233541234567',\n    'uuid': 'abc123',\n    'uniqueId':\
            \ 'xyz789'\n}\nurl = endPoint + '?key=' + apiKey\nheaders = {'Content-Type':\
            \ 'application/json'}\nresponse = requests.post(url, data=json.dumps(data),\
            \ headers=headers)\ndata = response.json()\n"
        - lang: nodejs
          source:
            "const axios = require('axios');\nconst endPoint = 'https://api.mnotify.com/api/initiate-ivr-call';\n\
            const apiKey = 'YOUR_API_KEY';\nconst data = {\n    'fromNumber': '233501234567',\n\
            \    'toNumber': '233541234567',\n    'uuid': 'abc123',\n    'uniqueId':\
            \ 'xyz789'\n};\nconst url = endPoint + '?key=' + apiKey;\nconst config =\
            \ {\n    method: 'post',\n    url: url,\n    headers: {\n        'Content-Type':\
            \ 'application/json'\n    },\n    data: data\n};\naxios(config)\n.then(function\
            \ (response) {\n    console.log(JSON.stringify(response.data));\n})\n.catch(function\
            \ (error) {\n    console.log(error);\n});\n"
  /callback-url:
    get:
      tags:
        - IVR (Inbound)
      summary: IVR Response From Client
      description:
        "This endpoint receives IVR responses from the client system during\
        \ an active IVR session.\n\n<strong>HTTP Request</strong>\n\n    GET https://your-server.com/callback-url\n\
        \n<p class=\"alert-primary\"><i class=\"las la-info-circle\" style=\"font-size:24px\"\
        ></i>This is a webhook endpoint that receives IVR interaction data. The parameters\
        \ are sent as query parameters in the GET request.</p>\n\n<strong>Expected\
        \ Response Format:</strong>\nYour server should respond with a JSON object\
        \ containing an \"actions\" object where each key represents an action to\
        \ be executed.\n\n<strong>Available Actions:</strong>\n- <strong>playback</strong>:\
        \ \U0001F3B5 Plays an audio file to the caller\n- <strong>get_digits</strong>:\
        \ \U0001F522 Plays audio and captures DTMF input\n- <strong>background</strong>:\
        \ \U0001F50A Plays background audio and collects single digit\n- <strong>dial</strong>:\
        \ \u260E Plays audio then dials a number or agent\n- <strong>hangup</strong>:\
        \ \U0001F51A Immediately ends the call\n- <strong>record</strong>: \U0001F534\
        \ Records audio input from caller\n"
      operationId: callhttps://your-server.com/callback-url
      parameters:
        - name: CallerId
          in: query
          description: The phone number or identifier of the caller
          required: false
          schema:
            type: string
          example: 0541509393
        - name: Extension
          in: query
          description: The extension or phone number dialed by the caller
          required: false
          schema:
            type: string
          example: 0541509394
        - name: SequenceID
          in: query
          description: A unique identifier representing the IVR interaction sequence
          required: false
          schema:
            type: integer
          example: 483930111
        - name: IsStarting
          in: query
          description: Indicates if this is beginning of the IVR session
          required: false
          schema:
            type: boolean
          example: true
        - name: DTMF
          in: query
          description: The DTMF tone pressed by the user
          required: false
          schema:
            type: integer
          example: 4
        - name: Timestamp
          in: query
          description: Date and time of the request
          required: false
          schema:
            type: string
          example: "201809810"
        - name: action
          in: query
          description: Action that was executed
          required: false
          schema:
            type: string
          example: playback
        - name: context
          in: query
          description: Used to determine whether call being made is inbound or outbound
          required: false
          schema:
            type: string
          example: incoming
        - name: recordingUrl
          in: query
          description: URL of recorded audio
          required: false
          schema:
            type: string
          example: https://example.com/recording_1423432.wav
      responses:
        "200":
          description: Success - Return IVR Actions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IVR_Response_Actions"
              examples:
                playback_example:
                  summary: Playback Action
                  value:
                    playback:
                      url: https://example.com/welcome.wav
                get_digits_example:
                  summary: Get Digits Action
                  value:
                    get_digits:
                      url: https://example.com/enter_pin.wav
                      num_digits: 4
                      timeout: 10000
                      finish_on_key: "#"
                      skip_audio: false
                background_example:
                  summary: Background Action
                  value:
                    background:
                      url: https://example.com/options.wav
                      timeout: 15000
                dial_example:
                  summary: Dial Action
                  value:
                    dial:
                      url: https://example.com/please_hold.wav
                hangup_example:
                  summary: Hangup Action
                  value:
                    hangup: {}
                record_example:
                  summary: Record Action
                  value:
                    record:
                      url: https://example.com/leave_message.wav
                      max_duration: 60
                      finish_on_key: "#"
                      play_beep: true
      x-codeSamples:
        - lang: curl
          source:
            "# GET https://your-server.com/callback-url?CallerId=0541509393&Extension=0541509394&SequenceID=483930111&IsStarting=true&DTMF=4&Timestamp=201809810&action=playback&context=incoming\n\
            \n# Your server should respond with JSON like this:\ncurl -X GET \"https://your-server.com/callback-url\"\
            \ \\\n-H \"Content-Type: application/json\" \\\n-d '{\n    \"CallerId\"\
            : \"233200000000\",\n    \"Extension\": \"233500000000\",\n    \"SequenceID\"\
            : \"483930111\",\n    \"IsStarting\": true,\n    \"DTMF\": \"4\",\n    \"\
            Timestamp\": \"201809810\",\n    \"action\": \"playback\",\n    \"context\"\
            : \"incoming\",\n    \"recordingUrl\": \"https://example.com/recording_1423432.wav\"\
            ,\n  }'\n"
        - lang: php
          source:
            "<?php\n  $url = \"https://your-server.com/callback-url\";\n\n  $params\
            \ = array(\n      \"CallerId\"   => \"0541509393\",\n      \"Extension\"\
            \   => \"0541509394\",\n      \"SequenceID\"   => \"483930111\",\n     \
            \ \"IsStarting\"   => \"true\",\n      \"DTMF\"   => \"4\",\n      \"Timestamp\"\
            \   => \"201809810\",\n      \"action\"   => \"playback\",\n      \"context\"\
            \   => \"incoming\",\n      \"recordingUrl\" => \"https://example.com/recording_1423432.wav\"\
            ,\n  );\n\n  $url .= '?' . http_build_query($params);\n\n  $ch = curl_init();\n\
            \  curl_setopt($ch, CURLOPT_URL, $url);\n  curl_setopt($ch, CURLOPT_RETURNTRANSFER,\
            \ true);\n  $result = curl_exec($ch);\n\n  if (curl_errno($ch)) {\n    \
            \  echo 'Error:' . curl_error($ch);\n  }\n  curl_close($ch);\n\n  $response\
