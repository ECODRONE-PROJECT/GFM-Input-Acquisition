            ,\"body\":\"Best message template\",\"id\":\"3\"}'\n"
        - lang: php
          source:
            "<?php\n    $endPoint = 'https://api.mnotify.com/api/template';\n\
            \    $apiKey = 'YOUR_API_KEY';\n    $id = 3;\n    $url = $endPoint . '/'\
            \ . $id . '?key=' . $apiKey;\n    $data = [\n        'title' => 'API testing',\n\
            \        'body' => 'Best message template' ,\n        'id' => 3\n    ];\n\
            \n    $ch = curl_init();\n    $headers = array();\n    $headers[] = \"Content-Type:\
            \ application/json\";\n    curl_setopt($ch, CURLOPT_HTTPHEADER, $headers);\n\
            \    curl_setopt($ch, CURLOPT_URL, $url);\n    curl_setopt($ch, CURLOPT_RETURNTRANSFER,\
            \ 1);\n    curl_setopt($ch, CURLOPT_CUSTOMREQUEST, \"PUT\");\n    curl_setopt($ch,\
            \ CURLOPT_POSTFIELDS, $data);\n    $result = curl_exec($ch);\n    $result\
            \ = json_decode($result, TRUE);\n    curl_close($ch);\n?>\n"
        - lang: python
          source:
            "import requests\n\nendPoint = 'https://api.mnotify.com/api/template'\n\
            apiKey = 'YOUR_API_KEY'\nid = 3\ndata = {\n  'title': 'API testing',\n \
            \ 'body': 'Best message template',\n  'id': 3\n}\nurl = endPoint + '/' +\
            \ id + '?key=' + apiKey\nresponse = requests.put(url, data)\ndata = response.json()\n"
        - lang: nodejs
          source:
            "const axios = require('axios');\nendPoint = 'https://api.mnotify.com/api/template'\n\
            apiKey = 'YOUR_API_KEY'\nid = 3\n\nconst data = {\n    'title': 'API testing',\n\
            \    'body': 'Best message template'\n    'id': '3'\n}\nurl = endPoint +\
            \ '/' + id + '?key=' + apiKey\nconst config = {\n        method: 'put',\n\
            \        path: url,\n        headers = {\n        'Accept': 'application/json'\n\
            \        },\n        data : data\n};\naxios(config)  \n.then(function (response)\
            \  {\nconsole.log(JSON.stringify(response.data));  \n})  \n.catch(function\
            \ (error)  {\nconsole.log(error);  \n})\n"
