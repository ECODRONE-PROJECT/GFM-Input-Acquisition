  /your-server.com/your-callback-url:
    post:
      tags:
        - USSD
      summary: Shared USSD
      description: |
        mNotify’s USSD service can be integrated in two modes:

        <p class="alert-primary"><i class="las la-info-circle" style="font-size:24px"></i>
        With the shared USSD service, applications can be hosted on a common short code without the extra cost and time of acquiring a dedicated one. It's quick to setup, affordable, and efficient to launch USSD-based solutions.</p>

        <h3>HTTP Request</h3>

        ```http
          POST https://your-server.com/callback-url

        ```

        <p>This explains how mNotify sends USSD session responses from USSD users to your provided callback URL (<code>your-callback-url</code>).</p>

        <h3>Expected Response Format</h3>

        Your application should respond with a JSON object containing:

        - **msisdn** 📞 Phone number provided in the request  
        - **sequenceID** 🆔 Sequence ID provided in the request  
        - **message** 💬 Response message for the user’s handset. Use <code>\r\n</code> for line breaks.  
        - **timestamp** 📅 Date and time of the response  
        - **continueFlag** 🔃 Whether the session continues (`0`) or ends (`1`).

      operationId: ussd/shared
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - msisdn
                - sequenceID
                - data
                - timestamp
              properties:
                msisdn:
                  type: string
                  description: End user's phone number
                sequenceID:
                  type: string
                  description: A unique identifier that distinguishes each USSD transaction
                data:
                  type: string
                  description: The request body submitted by the user
                timestamp:
                  type: string
                  description: Date and time of the request
            example:
              msisdn: "233541509394"
              sequenceID: "6789940010"
              data: "*899*86#"
              timestamp: "2025-09-01T11:22:33Z"
      responses:
        "200":
          description: Success - Return USSD response
          content:
            application/json:
              schema:
                type: object
                required:
                  - msisdn
                  - sequenceID
                  - message
                  - timestamp
                  - continueFlag
                properties:
                  msisdn:
                    type: string
                  sequenceID:
                    type: string
                  message:
                    type: string
                  timestamp:
                    type: string
                  continueFlag:
                    type: integer
                    enum: [0, 1]
              example:
                msisdn: "233541509394"
                sequenceID: "20180801110921"
                message: "WHAT YOU WANT USERS TO READ."
                timestamp: "6789940010"
                continueFlag: 0
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST "https://your-server.com/callback-url" \
            -H "Content-Type: application/json" \
            -d '{
              "msisdn":"233541509394",
              "sequenceID":"6789940010",
              "data":"*899*86#",
              "timestamp":"2025-09-01T11:22:33Z"
            }'
        - lang: php
          source: |
            <?php
            $url = "https://your-server.com/callback-url";
            $data = [
              "msisdn" => "233541509394",
              "sequenceID" => "6789940010",
              "data" => "*899*86#",
              "timestamp" => "2025-09-01T11:22:33Z"
            ];
            $ch = curl_init($url);
            curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);
            curl_setopt($ch, CURLOPT_POST, true);
            curl_setopt($ch, CURLOPT_HTTPHEADER, ["Content-Type: application/json"]);
            curl_setopt($ch, CURLOPT_POSTFIELDS, json_encode($data));
            $response = curl_exec($ch);
            curl_close($ch);
            ?>
        - lang: python
          source: |
            import requests

            url = "https://your-server.com/callback-url"
            data = {
              "msisdn": "233541509394",
              "sequenceID": "6789940010",
              "data": "*899*86#",
              "timestamp": "2025-09-01T11:22:33Z"
            }

            response = requests.post(url, json=data)
            print(response.json())
        - lang: nodejs
          source: |
            const axios = require('axios');

            const url = "https://your-server.com/callback-url";
            const data = {
              msisdn: "233541509394",
              sequenceID: "6789940010",
              data: "*899*86#",
              timestamp: "2025-09-01T11:22:33Z"
            };

            axios.post(url, data)
              .then(res => console.log(res.data))
              .catch(err => console.error(err));

