openapi: 3.1.0
info:
  version: ""
  title: BMS Documentation
  termsOfService: https://www.mnotifybms.com/terms-of-service/
  contact:
    email: info@mnotify.com
    url: https://www.mnotifybms.com/contact
  x-logo:
    url: https://mnotifybms.com/wp-content/uploads/2023/04/bms-logo.png
  description:
    '<img src="/images/code_typing-pana.svg" alt="dev"> Welcome to the
    BMS API v2.0! You can use our API to access BMS API endpoints, which can get information
    from your account as well as sending data to your account.


    We have language bindings in Curl, PHP, and Python! You can view code examples
    in the dark area to the right, and you can switch the programming language of
    the examples with the tabs in the top right.


    For integration in other languages, please click Here or contact us : support@mnotify.com'
tags:
  - name: Authentication
    description:
      "BMS uses API keys to allow access to the API. You can register or\
      \ login\n    for a new BMS API key by clicking <a\n    href=\"https://bms.mnotify.com/developer/api_v2\"\
      >here</a>.<br>BMS expects for the API key to be included in all API requests to\
      \ the\n    server as a GET parameter:\n\n<strong>Example</strong>\n\n    https://api.mnotify.com/api/template?key=YOUR_API_KEY"
  - name: Request
    description: "This API is built with REST and it uses HTTP verbs.


      Meaning every request made to the api must be RESTful with HTTP verbs such as
      GET, POST, PUT and DELETE requests."
  - name: Response
    description: All HTTP responses are of JSON format.
  - name: SMS
    description:
      Send Bulk SMS to individuals or groups. Each campaign consists of both
      sending using quick or group.
  - name: Voice
    description:
      Send Bulk Voice Call to individuals or groups. Each campaign consists
      of both sending using quick or group.
  - name: IVR (Inbound)
    description: This documentation is to guide for developers to integrate mNotify's Voice Interactive Response APIs.
  # - name: Outbound IVR Calls
  #   description: '<strong>Outbound IVR Endpoints</strong>


  #     https://readthedocs.mnotify.com/ivr_2ef59.html


  #     <p class="alert-primary"><i class="las la-info-circle" style="font-size:24px"></i>Visit
  #     the URL above to know more about our outbound IVR calls.</p>

  #     '
  #   externalDocs:
  #     description: See more on outbound IVR here
  #     url: https://readthedocs.mnotify.com/ivr_2ef59.html
  - name: Voice IVR Scenarios (Outbound)
    description: >-
      Design custom interactive voice response flows tailored to your communication needs. 
      With these scenarios, you can predefine call flows, enabling automated interactions with your recipients.
      
  - name: Scenarios Child Flow (Outbound)
    description: >-
      Design custom interactive voice response flows tailored to your communication needs. 
      With these scenarios, you can predefine call flows, enabling automated interactions with your recipients.

  - name: USSD
    description: |
      The purpose of this document is to provide a comprehensive guide for integrating mNotify's USSD service into your application. It contains all the necessary specifications and details about the communication API parameters, which developers can use for seamless integration.
  - name: Message Template
    description:
      Message templates are custom messages that you can create in your account
      so that you can reuse it to send messages to your recipients at any time.
  - name: Group
    description:
      Groups are created in your account to store your contacts in a more
      organized way.
  - name: Contact
    description: Add contacts to your groups in order to send message to them
paths:
  /template?key=YOUR_API_KEY:
    get:
      tags:
        - Message Template
      summary: Get all Message Templates
      description:
        "This endpoint retrieves all your message templates\n\n    GET\
        \ https://api.mnotify.com/api/template\n"
      operationId: template
      parameters:
        - name: key
          in: path
          description: Your enabled api key
          required: true
          schema:
            type: string
      security:
        - api_key:
            - your_api_key
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Get_template"
              example:
                status: success
                template_list:
                  - _id: 1
                    title: Testing Message
                    content: Just trying to test the message
                    type: Local SMS Template
                  - _id: 2
                    title: HAPPY BIRTHDAY
                    content: This day we would like to wish you a happy birthday.
                    type: Birthday Message Template
      x-codeSamples:
        - lang: curl
          source: curl -X GET "https://api.mnotify.com/api/template?key=YOUR_API_KEY"
        - lang: php
          source:
            "<?php\n    $endPoint = 'https://api.mnotify.com/api/template';\n\
            \    $apiKey = 'YOUR_API_KEY';\n    $url = $endPoint . '?key=' . $apiKey;\n\
            \n    $ch = curl_init();\n    curl_setopt($ch, CURLOPT_URL, $url);\n   \
            \ curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);\n    curl_setopt($ch, CURLOPT_CUSTOMREQUEST,\
            \ \"GET\");\n    $result = curl_exec($ch);\n    $result = json_decode($result,\
            \ TRUE);\n    curl_close($ch);\n?>\n"
        - lang: python
          source: "import requests

            endPoint = 'https://api.mnotify.com/api/template'

            apiKey = 'YOUR_API_KEY'

            url = endPoint + '?key=' + apiKey

            response = requests.get(url)

            data = response.json();

            "
        - lang: nodejs
          source:
            "const axios = require('axios');\nendPoint = 'https://api.mnotify.com/api/template'\n\
            apiKey = 'YOUR_API_KEY'\nurl = endPoint + '?key=' + apiKey\nconst config\
            \ = {method : 'get', path: url}\naxios(config)  \n.then(function (response)\
            \  {\nconsole.log(JSON.stringify(response.data));  \n})  \n.catch(function\
            \ (error)  {\nconsole.log(error);  \n})\n"
  /template/<id>:
    get:
      tags:
        - Message Template
      summary: Get a Specific Message Template
      description:
        "Retrieve a specific message template with id as a parameter.\n\
        \n<strong>HTTP Request</strong>\n\n    GET https://api.mnotify.com/api/template/<id>\n"
      operationId: template/id
      parameters:
        - name: key
          in: path
          description: Your enabled api key
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: id of specified message template
          required: true
          schema:
            type: int
      security:
        - api_key:
            - your_api_key
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Get_specific_template"
              example:
                status: success
                template_list:
                  _id: 1
                  title: Testing Message
                  content: Just trying to test the message
                  type: Local SMS Template
      x-codeSamples:
        - lang: curl
          source: curl -X GET "https://api.mnotify.com/api/template/1?key=YOUR_API_KEY"
        - lang: php
          source:
            "<?php\n    $endPoint = 'https://api.mnotify.com/api/template';\n\
            \    $apiKey = 'YOUR_API_KEY';\n    $id = 1;\n    $url = $endPoint . '/'\
            \ . $id . '?key=' . $apiKey;\n\n    $ch = curl_init();\n    curl_setopt($ch,\
            \ CURLOPT_URL, $url);\n    curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);\n\
            \    curl_setopt($ch, CURLOPT_CUSTOMREQUEST, \"GET\");\n    $result = curl_exec($ch);\n\
            \    $result = json_decode($result, TRUE);\n    curl_close($ch);\n?>\n"
        - lang: python
          source: "import requests


            endPoint = 'https://api.mnotify.com/api/template'

            apiKey = 'YOUR_API_KEY'

            id = 1

            url = endPoint + '/' + id + '?key=' + apiKey

            response = requests.get(url)

            data = response.json()

            "
        - lang: nodejs
          source:
            "const axios = require('axios');\nendPoint = 'https://api.mnotify.com/api/template'\n\
            apiKey = 'YOUR_API_KEY'\nid =  = '1'\nurl = endPoint + '/' + id + '?key='\
            \ + apiKey\nconst config = {method : 'get', path: url}\naxios(config)  \n\
            .then(function (response)  {\nconsole.log(JSON.stringify(response.data));\
            \  \n})  \n.catch(function (error)  {\nconsole.log(error);  \n})\n"
  /template:
    post:
      tags:
        - Message Template
      summary: Add Message Template
      description:
        "Add a message template with data..\n\n<strong>HTTP Request</strong>\n\
        \n    POST https://api.mnotify.com/api/template\n <p class=\"alert-primary\"\
        ><i class=\"las la-info-circle\" style=\"font-size:24px\"></i>the response\
        \ parameter _id returned in the JSON response is the id of the newly created\
        \ message template. You can save it somewhere in your personal DB.</p>\n <span\
        \ class=\"alert-success\" style=\"margin-top:14px\"><i class=\"las la-check-circle\"\
        \ style=\"font-size:24px\"></i>You can add placeholders for firstname: [fname],\
        \ fullname: [fullname], title and lastname: [lname]</span>\n"
      operationId: template/add
      parameters:
        - name: key
          in: path
          description: Your enabled api key
          required: true
          schema:
            type: string
        - name: title
          in: path
          description: Title of message template
          required: true
          schema:
            type: string
        - name: body
          in: path
          description: Body of message template
          required: true
          schema:
            type: text
      security:
        - api_key:
            - your_api_key
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Add_template"
              example:
                status: success
                _id: "3"
      x-codeSamples:
        - lang: curl
          source:
            'curl -X POST "https://api.mnotify.com/api/template?key=YOUR_API_KEY"

            -H "Content-Type:application/json"

            -d ''{"title":"API testing","body":"Best message template"}''

            '
        - lang: php
          source:
            "<?php\n    $endPoint = 'https://api.mnotify.com/api/template';\n\
            \    $apiKey = 'YOUR_API_KEY';\n    $url = $endPoint . '?key=' . $apiKey;\n\
            \    $data = [\n      'title' => 'API testing',\n      'body' => 'Best message\
            \ template' \n    ];\n\n    $ch = curl_init();\n    $headers = array();\n\
            \    $headers[] = \"Content-Type: application/json\";\n    curl_setopt($ch,\
            \ CURLOPT_HTTPHEADER, $headers);\n    curl_setopt($ch, CURLOPT_URL, $url);\n\
            \    curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);\n    curl_setopt($ch,\
            \ CURLOPT_CUSTOMREQUEST, \"POST\");\n    curl_setopt($ch, CURLOPT_POSTFIELDS,\
            \ $data);\n    $result = curl_exec($ch);\n    $result = json_decode($result,\
            \ TRUE);\n    curl_close($ch);\n?>\n"
        - lang: python
          source:
            "import requests\nendPoint = 'https://api.mnotify.com/api/template'\n\
            apiKey = 'YOUR_API_KEY'\ndata = {\n  'title': 'API testing',\n  'body':\
            \ 'Best message template'\n}\nurl = endPoint + '?key=' + apiKey\nresponse\
            \ = requests.post(url, data)\ndata = response.json()\n"
        - lang: nodejs
          source:
            "const axios = require('axios');\nendPoint = 'https://api.mnotify.com/api/template'\n\
            apiKey = 'YOUR_API_KEY'\nconst data = {\n    'title': 'API testing',\n \
            \   'body': 'Best message template'\n}\nurl = endPoint + '?key=' + apiKey\n\
            const config = {\n        method: 'post',\n        path: url,\n        headers\
            \ = {\n        'Accept': 'application/json'\n        },\n        data :\
            \ data\n};\naxios(config)  \n.then(function (response)  {\nconsole.log(JSON.stringify(response.data));\
            \  \n})  \n.catch(function (error)  {\nconsole.log(error);  \n})\n"
